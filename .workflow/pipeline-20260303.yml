version: '1.0'
name: pipeline-20260303
displayName: pipeline-20260303
triggers:
  trigger: auto
  schedule:
    - cron: '0 */5 * * * ? *'
variables:
  global:
    - REL_SYNC_TOKEN
stages:
  - name: sync_release
    displayName: Sync Release Assets
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@maven
        name: release_sync
        displayName: Release Sync
        jdkVersion: '8'
        mavenVersion: 3.3.9
        commands:
          - set -euo pipefail
          - if command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y jq curl bash; elif command -v apk >/dev/null 2>&1; then apk add --no-cache jq curl bash; elif command -v yum >/dev/null 2>&1; then yum install -y jq curl bash; fi
          - chmod +x .github/scripts/sync-release-to-gitee.sh
          - export SOURCE_GITHUB_REPOSITORY=AAswordman/OperitNightlyRelease
          - export GITEE_OWNER=AAswordman
          - export GITEE_REPO=OperitNightlyRelease
          - export GH_RELEASE_MIRROR_PREFIXES="https://ghfast.top/;https://flash.aaswordsman.org/"
          - export SYNC_ASSET_CONCURRENCY=4
          - echo "[debug] ci var names" && (env | cut -d= -f1 | grep -E '^(GITEE|REL_SYNC|SYNC_GITEE|SYSTEM_FILE_PARAMETER_CACHE|GITHUB_TOKEN|GH_RELEASE_MIRROR_PREFIXES|SYNC_ASSET_CONCURRENCY)' || true)
          - if [ -n "${SYSTEM_FILE_PARAMETER_CACHE:-}" ] && [ -f "${SYSTEM_FILE_PARAMETER_CACHE}" ]; then echo "[debug] parameter cache present"; jq -r 'paths(scalars) | map(tostring) | join(".")' "${SYSTEM_FILE_PARAMETER_CACHE}" | grep -Ei 'gitee|token|rel_sync|sync' | head -n 200 || true; else echo "[debug] parameter cache missing"; fi
          - bash .github/scripts/sync-release-to-gitee.sh latest
          - mkdir -p target
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
        settings: []
        caches:
          - ~/.m2
        notify: []
        strategy:
          retry: '0'
